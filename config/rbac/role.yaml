---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - k8s.tochka.com
  resources:
  - multidcpoddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s.tochka.com
  resources:
  - multidcpoddisruptionbudgets/finalizers
  verbs:
  - update
- apiGroups:
  - k8s.tochka.com
  resources:
  - multidcpoddisruptionbudgets/status
  verbs:
  - get
  - patch
  - update
